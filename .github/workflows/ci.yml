name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (tests, scripts)
        run: ruff check tests scripts --output-format=concise

      - name: Ruff (src; informational)
        run: ruff check src --output-format=concise || true

      - name: Mypy
        run: mypy src --no-error-summary 2>/dev/null || true

      - name: Pytest
        run: PYTHONPATH=. pytest tests/unit tests/integration -v --tb=short
        env:
          SQLITE_APP_PATH: /tmp/ci_app.sqlite
          SQLITE_MANUFACTURING_PATH: /tmp/ci_manufacturing.sqlite
