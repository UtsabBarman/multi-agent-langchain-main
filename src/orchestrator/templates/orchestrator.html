  if (iframe && iframe.src) iframe.src = iframe.src;
}
var pollIntervalMs = 700;
var pollTimeoutMs = 120000;
async function submit() {
  var q = queryEl.value.trim();
  if (!q) return;
  queryEl.value = '';
  activeRequestId = null;
  historyListEl.querySelectorAll('.history-item').forEach(function(el) { el.classList.remove('active'); });
  addUserMessage(q);
  var prevLive = document.getElementById('live-reply');
  if (prevLive) {
    prevLive.id = '';
    var prevContent = prevLive.querySelector('.content');
    if (prevContent) prevContent.innerHTML = '<div class="bubble" style="color:#8e8ea0;">—</div>';
  }
  sendBtn.disabled = true;
  var liveEl = addLiveReplyContainer();
  try {
    var r = await fetch('/query/async', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: q }) });
    if (r.status !== 202) {
      var err = await r.json().catch(function() { return {}; });
      liveEl.innerHTML = '<div class="reporter-card error"><div class="reporter-label">Error</div><div class="reporter-content">' + escapeHtml(err.detail || 'Request failed') + '</div></div>';
      sendBtn.disabled = false;
      return;
    }
    var data = await r.json();
    var requestId = data.request_id;
    var lastStepCount = 0;
    var start = Date.now();
    function poll() {
      if (Date.now() - start > pollTimeoutMs) {
        liveEl.innerHTML = '<div class="reporter-card error"><div class="reporter-label">Timeout</div><div class="reporter-content">Request took too long.</div></div>';
        sendBtn.disabled = false;
        return;
      }
      fetch('/request/' + requestId).then(function(tr) { return tr.json(); }).then(function(trace) {
        renderLiveReply(trace, liveEl);
        var stepResults = trace.step_results || [];
        if (stepResults.length > lastStepCount) {
          for (var i = lastStepCount; i < stepResults.length; i++) {
            var an = (stepResults[i].agent_name || '').toLowerCase();
            var num = (agentMeta[an] && agentMeta[an].iframeNum) ? agentMeta[an].iframeNum : (i + 1);
            reloadAgentIframe(num);
          }
          lastStepCount = stepResults.length;
        }
        var status = trace.status || 'running';
        if (status !== 'running' && status !== 'pending') {
          sendBtn.disabled = false;
          var msgDiv = liveEl.closest('.message');
          if (msgDiv && msgDiv.id === 'live-reply') msgDiv.id = '';
          loadHistory();
          return;
        }
        setTimeout(poll, pollIntervalMs);
      }).catch(function(e) {
        liveEl.innerHTML = '<div class="reporter-card error"><div class="reporter-label">Error</div><div class="reporter-content">' + escapeHtml(e.message || 'Poll failed') + '</div></div>';
        sendBtn.disabled = false;
      });
    }
    setTimeout(poll, pollIntervalMs);
  } catch (e) {
    liveEl.innerHTML = '<div class="reporter-card error"><div class="reporter-label">Error</div><div class="reporter-content">' + escapeHtml(e.message || 'Request failed') + '</div></div>';
    sendBtn.disabled = false;
  }
}
var historyListEl = document.getElementById('history-list');
var historyEmptyEl = document.getElementById('history-empty');
var activeRequestId = null;
function deleteConversation(requestId, ev) {
  if (ev) ev.stopPropagation();
  if (!confirm('Delete this conversation permanently?')) return;
  fetch('/request/' + encodeURIComponent(requestId), { method: 'DELETE' }).then(function(r) {
    if (r.ok) {
      if (activeRequestId === requestId) {
        activeRequestId = null;
        messagesEl.innerHTML = '';
        emptyEl.style.display = 'block';
      }
      loadHistory();
    } else { r.json().then(function(d) { alert(d.detail || 'Delete failed'); }).catch(function() { alert('Delete failed'); }); }
  }).catch(function() { alert('Delete failed'); });
}
function renderHistoryItem(item) {
  var div = document.createElement('div');
  div.className = 'history-item' + (activeRequestId === item.id ? ' active' : '');
  div.dataset.requestId = item.id;
  var queryShort = (item.query || '').slice(0, 120);
  if ((item.query || '').length > 120) queryShort += '…';
  var statusCls = item.status === 'completed' ? 'status' : (item.status === 'failed' ? 'status failed' : 'status partial');
  var timeStr = item.created_at ? (item.created_at.slice(0, 19).replace('T', ' ') || item.created_at) : '';
  var deleteSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
  div.innerHTML = '<div class="history-item-body"><div class="history-item-query">' + escapeHtml(queryShort) + '</div><div class="history-item-meta"><span class="' + statusCls + '">' + escapeHtml(item.status) + '</span>' + (timeStr ? ' · ' + escapeHtml(timeStr) : '') + '</div></div><button type="button" class="history-item-delete" title="Delete conversation" aria-label="Delete">' + deleteSvg + '</button>';
  div.onclick = function(e) { if (!e.target.closest('.history-item-delete')) loadConversation(item.id); };
  div.querySelector('.history-item-delete').onclick = function(e) { deleteConversation(item.id, e); };
  return div;
}
function loadHistory() {
  fetch('/history').then(function(r) { return r.json(); }).then(function(data) {
    var items = data.items || [];
    historyEmptyEl.style.display = items.length ? 'none' : 'block';
    historyListEl.querySelectorAll('.history-item').forEach(function(el) { el.remove(); });
    items.forEach(function(item) {
      historyListEl.appendChild(renderHistoryItem(item));
    });
  }).catch(function() {});
}
function loadConversation(requestId) {
  activeRequestId = requestId;
  historyListEl.querySelectorAll('.history-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.requestId === requestId);
  });
  fetch('/request/' + requestId).then(function(r) { return r.json(); }).then(function(trace) {
    emptyEl.style.display = 'none';
    messagesEl.innerHTML = '';
    var userDiv = document.createElement('div');
    userDiv.className = 'message user';
    userDiv.innerHTML = '<span class="avatar">U</span><div class="content"><div class="bubble">' + escapeHtml(trace.query || '') + '</div></div>';
    messagesEl.appendChild(userDiv);
    var asstDiv = document.createElement('div');
    asstDiv.className = 'message assistant' + (trace.status !== 'completed' ? ' error' : '');
    var ans = trace.final_answer != null ? trace.final_answer : (trace.error_message || '');
    asstDiv.innerHTML = '<span class="avatar">O</span><div class="content"><div class="bubble">' + sanitizeHtml(ans) + '</div></div>';
    messagesEl.appendChild(asstDiv);
    chatEl.scrollTop = chatEl.scrollHeight;
  }).catch(function() {});
}
loadHistory();
var storeSection = document.getElementById('store-section');
var docFile = document.getElementById('doc-file');
var docCollection = document.getElementById('doc-collection');
var docUploadBtn = document.getElementById('doc-upload');
var docMsg = document.getElementById('doc-msg');
var dbConnection = document.getElementById('db-connection');
var dbTestBtn = document.getElementById('db-test');
var dbMsg = document.getElementById('db-msg');
var tablesDetails = document.getElementById('tables-details');
var tablesList = document.getElementById('tables-list');
storeSection.addEventListener('toggle', function() {
  if (storeSection.open && dbConnection.options.length <= 1) {
    fetch('/api/db/connections').then(function(r) { return r.json(); }).then(function(d) {
      var conns = d.connections || [];
      conns.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c.connection_id;
        opt.textContent = c.id + ' (' + c.connection_id + ')';
        dbConnection.appendChild(opt);
      });
    }).catch(function() {});
  }
});
docUploadBtn.addEventListener('click', function() {
  var file = docFile.files[0];
  var coll = (docCollection.value || 'manufacturing_docs').trim();
  docMsg.textContent = '';
  if (!file) { docMsg.textContent = 'Select a .txt or .md file'; docMsg.className = 'store-msg err'; return; }
  docMsg.textContent = 'Uploading…'; docMsg.className = 'store-msg';
  var fd = new FormData();
  fd.append('file', file);
  fetch('/api/doc/upload?collection_name=' + encodeURIComponent(coll), { method: 'POST', body: fd }).then(function(r) {
    return r.json().then(function(d) {
      if (r.ok) { docMsg.textContent = 'Indexed ' + (d.chunks_added || 0) + ' chunks in ' + (d.collection || coll); docMsg.className = 'store-msg ok'; }
      else { docMsg.textContent = d.detail || 'Upload failed'; docMsg.className = 'store-msg err'; }
    }).catch(function() { docMsg.textContent = 'Upload failed'; docMsg.className = 'store-msg err'; });
  }).catch(function() { docMsg.textContent = 'Upload failed'; docMsg.className = 'store-msg err'; });
});
dbTestBtn.addEventListener('click', function() {
  var cid = dbConnection.value;
  dbMsg.textContent = '';
  if (!cid) { dbMsg.textContent = 'Select a connection'; dbMsg.className = 'store-msg err'; return; }
  dbMsg.textContent = 'Testing…'; dbMsg.className = 'store-msg';
  fetch('/api/db/test?connection_id=' + encodeURIComponent(cid)).then(function(r) {
    return r.json().then(function(d) {
      if (r.ok) { dbMsg.textContent = d.message || 'Connected'; dbMsg.className = 'store-msg ok'; }
      else { dbMsg.textContent = d.detail || 'Connection failed'; dbMsg.className = 'store-msg err'; }
    }).catch(function() { dbMsg.textContent = 'Connection failed'; dbMsg.className = 'store-msg err'; });
  }).catch(function() { dbMsg.textContent = 'Connection failed'; dbMsg.className = 'store-msg err'; });
});
dbConnection.addEventListener('change', function() { tablesList.innerHTML = ''; });
tablesDetails.addEventListener('toggle', function() {
  if (tablesDetails.open) {
    tablesList.innerHTML = '';
    var cid = dbConnection.value;
    if (!cid) { tablesList.innerHTML = '<span>Select a connection first</span>'; return; }
    tablesList.innerHTML = '<span>Loading…</span>';
    fetch('/api/db/tables?connection_id=' + encodeURIComponent(cid)).then(function(r) { return r.json(); }).then(function(d) {
      var tables = d.tables || [];
      tablesList.innerHTML = '';
      if (tables.length === 0) tablesList.innerHTML = '<span>No tables</span>';
      else tables.forEach(function(t) { var s = document.createElement('span'); s.textContent = t; tablesList.appendChild(s); });
    }).catch(function() { tablesList.innerHTML = '<span>Failed to load</span>'; });
  }
});
tablesDetails.addEventListener('toggle', function() { if (!tablesDetails.open) tablesList.innerHTML = ''; });
sendBtn.addEventListener('click', submit);
queryEl.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
  </script>
